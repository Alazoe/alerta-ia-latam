<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alerta Influenza Aviar – Latinoamérica</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    header {
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      padding: 20px 24px;
      border-bottom: 2px solid #dc2626;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 1.4rem; color: #f8fafc; }
    header p { font-size: 0.85rem; color: #94a3b8; margin-top: 2px; }
    .badge {
      background: #dc2626; color: white;
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.75rem; font-weight: bold;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .container { display: flex; height: calc(100vh - 80px); }
    #map { flex: 1; }
    .sidebar {
      width: 360px; background: #1e293b;
      overflow-y: auto; border-left: 1px solid #334155;
    }
    .sidebar-header {
      padding: 16px; background: #0f172a;
      border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 10;
    }
    .sidebar-header h2 { font-size: 1rem; color: #f1f5f9; }
    #last-updated { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    .alert-card {
      padding: 14px 16px;
      border-bottom: 1px solid #334155;
      cursor: pointer; transition: background 0.2s;
    }
    .alert-card:hover { background: #273549; }
    .alert-card .country {
      font-size: 0.7rem; font-weight: bold;
      color: #f97316; text-transform: uppercase; letter-spacing: 1px;
    }
    .alert-card .title {
      font-size: 0.88rem; color: #e2e8f0; margin: 4px 0;
      line-height: 1.4;
    }
    .alert-card .meta {
      font-size: 0.75rem; color: #64748b;
      display: flex; justify-content: space-between;
    }
    .alert-card a { color: #38bdf8; font-size: 0.75rem; text-decoration: none; }
    .alert-card a:hover { text-decoration: underline; }
    .no-alerts {
      padding: 40px 20px; text-align: center; color: #64748b;
    }
    .telegram-btn {
      display: block; margin: 16px;
      background: #0088cc; color: white;
      text-align: center; padding: 10px;
      border-radius: 8px; text-decoration: none;
      font-size: 0.85rem; font-weight: bold;
    }
    .telegram-btn:hover { background: #006fa3; }
    .stats {
      padding: 12px 16px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      display: flex; gap: 20px;
    }
    .stat { text-align: center; }
    .stat .num { font-size: 1.4rem; font-weight: bold; color: #f97316; }
    .stat .label { font-size: 0.7rem; color: #64748b; }
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; height: 50vh; border-left: none; border-top: 1px solid #334155; }
      #map { height: 50vh; }
    }
  </style>
</head>
<body>
<header>
  <div>
    <h1>🦅 Alerta Influenza Aviar – Latinoamérica</h1>
    <p>Monitoreo automático de fuentes oficiales · Actualización cada hora</p>
  </div>
  <span class="badge">EN VIVO</span>
</header>

<div class="container">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>📋 Alertas recientes</h2>
      <div id="last-updated">Cargando...</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="total-count">0</div><div class="label">Eventos totales</div></div>
      <div class="stat"><div class="num" id="country-count">0</div><div class="label">Países afectados</div></div>
    </div>
    <a class="telegram-btn" href="https://t.me/AlertaIALatam" target="_blank">
      📲 Suscribirse al canal de alertas
    </a>
    <div id="alerts-list"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Mapa
  const map = L.map('map', {
    center: [-15, -65],
    zoom: 3,
    zoomControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CartoDB',
    maxZoom: 10
  }).addTo(map);

  const markers = {};

  function getMarkerIcon(count) {
    const size = Math.min(20 + count * 6, 50);
    return L.divIcon({
      html: `<div style="
        width:${size}px;height:${size}px;
        background:rgba(220,38,38,0.85);
        border:2px solid #ff6b6b;
        border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        color:white;font-weight:bold;font-size:${size>30?'13':'11'}px;
        box-shadow:0 0 12px rgba(220,38,38,0.6);
      ">${count}</div>`,
      className: '',
      iconSize: [size, size],
      iconAnchor: [size/2, size/2]
    });
  }

  function loadAlerts() {
    fetch('map_data.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('last-updated').textContent = 
          'Última actualización: ' + (data.last_updated || 'N/A');

        const alerts = data.alerts || [];
        document.getElementById('total-count').textContent = alerts.length;

        const countries = new Set(alerts.map(a => a.country).filter(Boolean));
        document.getElementById('country-count').textContent = countries.size;

        // Limpiar marcadores
        Object.values(markers).forEach(m => map.removeLayer(m));

        // Agrupar por país
        const byCountry = {};
        alerts.forEach(a => {
          const key = a.country || 'Desconocido';
          if (!byCountry[key]) byCountry[key] = [];
          byCountry[key].push(a);
        });

        // Agregar marcadores
        Object.entries(byCountry).forEach(([country, countryAlerts]) => {
          const first = countryAlerts[0];
          if (!first.lat || !first.lng) return;

          const popup = countryAlerts.map(a =>
            `<b>${a.title}</b><br>
             <small>📅 ${a.date || ''} · ${a.source}</small><br>
             ${a.link ? `<a href="${a.link}" target="_blank">Ver fuente →</a>` : ''}`
          ).join('<hr style="margin:6px 0">');

          const marker = L.marker([first.lat, first.lng], {
            icon: getMarkerIcon(countryAlerts.length)
          }).addTo(map).bindPopup(
            `<div style="min-width:220px;font-family:sans-serif">
              <b style="color:#dc2626">🇦🇷 ${country}</b><br>
              <small>${countryAlerts.length} evento(s)</small><hr>
              ${popup}
            </div>`, { maxWidth: 300 }
          );
          markers[country] = marker;
        });

        // Lista lateral
        const list = document.getElementById('alerts-list');
        if (alerts.length === 0) {
          list.innerHTML = '<div class="no-alerts">✅ Sin eventos activos en Latinoamérica</div>';
          return;
        }
        list.innerHTML = [...alerts].reverse().map(a => `
          <div class="alert-card" onclick="flyTo(${a.lat},${a.lng})">
            <div class="country">📍 ${a.country || 'Latinoamérica'}</div>
            <div class="title">${a.title}</div>
            <div class="meta">
              <span>${a.source}</span>
              <span>${a.date || ''}</span>
            </div>
            ${a.link ? `<a href="${a.link}" target="_blank">Ver fuente →</a>` : ''}
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('alerts-list').innerHTML =
          '<div class="no-alerts">⚠️ Sin datos aún. El bot actualizará el mapa en la próxima ejecución.</div>';
        document.getElementById('last-updated').textContent = 'Esperando primera ejecución...';
      });
  }

  function flyTo(lat, lng) {
    if (lat && lng) map.flyTo([lat, lng], 5, { duration: 1 });
  }

  loadAlerts();
  setInterval(loadAlerts, 60000); // Recargar cada minuto
</script>
</body>
</html>
