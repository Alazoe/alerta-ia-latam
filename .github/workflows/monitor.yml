name: Monitor Influenza Aviar Latam

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora
  workflow_dispatch:

permissions:
  contents: write  # Necesario para actualizar el mapa en GitHub Pages

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Restaurar historial de alertas
        uses: actions/cache@v3
        with:
          path: seen_alerts.json
          key: seen-alerts-${{ github.run_id }}
          restore-keys: seen-alerts-

      - name: Ejecutar monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
        run: python monitor.py

      - name: Guardar historial
        uses: actions/cache@v3
        with:
          path: seen_alerts.json
          key: seen-alerts-${{ github.run_id }}

      - name: Publicar mapa actualizado en GitHub Pages
        run: |
          git config user.name "AlertaBot"
          git config user.email "bot@alertaIA.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Actualizar mapa de alertas $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
