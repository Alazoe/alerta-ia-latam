name: Monitor Influenza Aviar Latam

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar monitor
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHATSAPP_PHONE:   ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY:  ${{ secrets.WHATSAPP_APIKEY }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python monitor.py

      - name: Publicar mapa en GitHub Pages
        run: |
          git config user.name "AlertaBot"
          git config user.email "bot@alertaIA.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Actualizar mapa $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
